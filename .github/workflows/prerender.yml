name: Prerender
on:
  workflow_dispatch:
  # uncomment if the website renders dynamic content e.g. via lovable cloud/supabase
  # schedule:
  #   - cron: '0 */6 * * *'  # Every 6 hours
  push:
    branches: [main]
    paths: ['src/**', 'public/**', 'index.html', 'prerender.js']
concurrency:
  group: prerender
  cancel-in-progress: true
jobs:
  prerender:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with: { bun-version: "1.3.9" }
      - run: bun install
      - name: Install browsers and build
        run: |
          npx playwright install --with-deps chromium &
          bun run build
          wait
      - run: node prerender.js
      - name: Deploy
        if: github.ref == 'refs/heads/main'
        run: |
          MSG=$(git log -1 --pretty=%s)
          cd dist && git init
          git config user.name "prerender"
          git config user.email "ben@steadybow.co.uk"
          git remote add origin https://x-access-token:${{ github.token }}@github.com/${{ github.repository }}.git
          git fetch origin prerender:prerender 2>/dev/null && git reset --soft prerender || true
          git add -A
          git commit -m "[PRERENDER] $MSG" || exit 0
          git push --force origin HEAD:prerender
